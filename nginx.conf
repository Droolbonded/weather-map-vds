# Weather Map - Nginx site config
# --------------------------------
# Kurulum:
#   sudo cp nginx.conf /etc/nginx/sites-available/weather-map
#   sudo ln -sf /etc/nginx/sites-available/weather-map /etc/nginx/sites-enabled/weather-map
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# server_name asagida sunucu IP'si veya domain ile degistirilmelidir.

upstream weather_map_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # IP ile yayin yapilirken "_" tum hostname'leri yakalar.
    # Domain takildiginda burayi domain ile degistirin.
    server_name _;

    # ESP32-CAM JPEG yuklemeleri icin guvenli ust sinir.
    client_max_body_size 12m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/manifest+json
        image/svg+xml
        font/woff2;

    # Statik SPA
    root /var/www/weather-map/artifacts/esp32-map/dist/public;
    index index.html;

    # Vite hash'li asset'ler uzun sureli cache'lenebilir.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API ve ESP32 endpoint'leri
    location /api/ {
        proxy_pass http://weather_map_api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_request_buffering off;
    }

    # SPA fallback - tum diger istekleri index.html'e dus.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gizli dosyalara erisimi engelle.
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
