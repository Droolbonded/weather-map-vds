name: Deploy Frontend To GitHub Pages

on:
  push:
    branches:
      - main
      - update-image
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite static output)
        env:
          NODE_ENV: production
          PORT: 5173
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm --filter @workspace/esp32-map run build

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/esp32-map/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
