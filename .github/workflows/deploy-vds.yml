name: Deploy To VDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vds-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH Deploy → VDS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/var/www/weather-map"

            echo "==> Repo guncelleniyor..."
            cd "$APP_DIR"
            git pull origin main

            echo "==> Deploy scripti calistiriliyor..."
            sudo bash scripts/deploy.sh

            echo "==> Deploy tamamlandi ✅"
